services:
  # ── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artisangps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override DB host to point to the 'db' service, not localhost
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/artisangps
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for live reload during development
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
